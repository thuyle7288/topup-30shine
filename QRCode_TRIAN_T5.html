<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Menu TRI ÂN T5 — In A5 đặt tại salon</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Helvetica Neue',Arial,sans-serif}
  body{background:#e8eaef;padding:24px;color:#1a2855}
  .note{max-width:520px;margin:0 auto 16px;background:#fff;padding:14px 18px;border-radius:10px;border-left:4px solid #d4af37;font-size:13.5px;color:#1a2855}
  .note b{color:#e74c3c}

  /* CARD A5 */
  .a5{width:148mm;height:210mm;margin:0 auto;background:linear-gradient(160deg,#0f1a3a 0%,#1a2855 50%,#2d3f7a 100%);color:#fff;padding:14mm 12mm;display:flex;flex-direction:column;align-items:center;justify-content:space-between;box-shadow:0 12px 40px rgba(0,0,0,.2);position:relative;overflow:hidden}
  .a5::before{content:"";position:absolute;top:-40px;right:-40px;width:160px;height:160px;border:3px solid #d4af37;border-radius:50%;opacity:.18}
  .a5::after{content:"";position:absolute;bottom:-50px;left:-50px;width:200px;height:200px;border:3px solid #d4af37;border-radius:50%;opacity:.12}

  .brand{font-size:11px;letter-spacing:6px;color:#d4af37;font-weight:800;text-align:center;z-index:1}
  .title{text-align:center;margin-top:4mm;z-index:1}
  .title h1{font-size:34px;font-weight:900;line-height:1.1}
  .title h1 b{color:#d4af37;font-style:italic;font-family:'Playfair Display','Times New Roman',serif}
  .title .sub{font-size:13px;color:#a8b2d1;margin-top:6px;letter-spacing:1.5px}

  .qr-wrap{background:#fff;padding:8mm;border-radius:6mm;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:1}
  .qr-wrap img{display:block;width:90mm;height:90mm}

  .call{text-align:center;z-index:1;margin-top:2mm}
  .call .lb{font-size:14px;font-weight:800;color:#d4af37;letter-spacing:2px}
  .call .big{font-size:24px;font-weight:900;margin-top:3mm;line-height:1.2}
  .call .big b{color:#d4af37;font-style:italic;font-family:'Playfair Display','Times New Roman',serif}

  .slogan{text-align:center;font-size:13px;color:#a8b2d1;font-style:italic;z-index:1;border-top:1px dashed rgba(212,175,55,.4);padding-top:4mm;width:100%}
  .slogan b{color:#d4af37;font-style:normal}

  /* PRINT */
  @media print{
    @page{size:A5 portrait;margin:0}
    body{background:#fff;padding:0}
    .note{display:none}
    .a5{margin:0;box-shadow:none;border-radius:0;width:100%;height:100vh}
  }
</style>
</head>
<body>

<div class="note">
  📄 <b>HƯỚNG DẪN IN</b>: Bấm <b>Ctrl+P</b> (Cmd+P trên Mac) → chọn <b>A5</b> → Margins: None → In màu → đặt cạnh khu trưng bày máy massage tại salon.
</div>

<div class="a5">
  <div class="brand">★ 30 SHINE ★</div>

  <div class="title">
    <h1><b>TRI ÂN</b> · T5/2026</h1>
    <div class="sub">QUÉT MÃ XEM QUÀ TẶNG</div>
  </div>

  <div class="qr-wrap">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=600x600&margin=10&data=https%3A%2F%2Fthuyle7288.github.io%2Ftopup-30shine%2FTriAn_T5_KH_Menu.html" alt="QR Code">
  </div>

  <div class="call">
    <div class="lb">MUA THẺ TRẢ TRƯỚC</div>
    <div class="big">Rước <b>máy massage</b><br>về nhà</div>
  </div>

  <div class="slogan">
    Chỉ dành cho <b>1.000 KH đầu tiên</b> tháng 5/2026
  </div>
</div>

</body>
</html>
